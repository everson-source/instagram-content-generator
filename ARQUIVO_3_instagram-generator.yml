name: Gerar Conteúdo Instagram Automático

on:
  schedule:
    # Roda todo dia às 8:00 AM (horário UTC)
    # Para mudar o horário: altere "0 8 * * *"
    # Formato: minuto hora dia mês dia_semana
    # Exemplos: "0 14 * * *" = 14h (11h BRT), "0 5 * * 1-5" = 5h seg-sex
    - cron: '0 11 * * *'
  
  # Permite disparar manualmente
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Gerar conteúdo Instagram
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python instagram_content_generator.py
      
      - name: Notificação (opcional - ativar depois)
        if: success()
        run: |
          echo "✅ Conteúdo gerado com sucesso!"
          # Aqui você pode adicionar notificação via webhook, email, etc
